{% extends "manage_layout.html" %}

{% block manage_content %}
    {% include "fragments/context_upload.html" %}
    
    {% include "fragments/context_documents_section.html" %}

    <hr style="border: none; border-top: 1px solid var(--border-color); margin-bottom: 25px;">

    {% include "fragments/context_editor.html" %}
{% endblock %}

{% block scripts %}
<style>
    #editorjs-container {
        background: rgba(0,0,0,0.2);
        border: 1px solid var(--border-color);
        border-radius: 8px;
        padding: 20px;
        min-height: 400px;
        color: var(--khaki-beige);
        font-family: inherit;
    }
    
    .ce-block__content, .ce-toolbar__content {
        max-width: 100%;
    }

    .ce-popover {
        background: var(--shadow-grey);
        border: 1px solid var(--border-color);
        color: var(--khaki-beige);
    }
    
    .ce-popover__item:hover {
        background: var(--shadow-contrast-10) !important;
    }

    .ce-popover__item-icon {
        background: rgba(0,0,0,0.2);
        color: var(--khaki-beige);
    }
    
    .cdx-search-field {
        background: rgba(0,0,0,0.2);
        color: var(--khaki-beige);
    }
    
    .ce-inline-toolbar {
        background: var(--shadow-grey);
        border: 1px solid var(--border-color);
        color: var(--khaki-beige);
    }

    .ce-inline-tool {
        color: var(--khaki-beige);
    }

    .ce-inline-tool:hover {
        background: var(--shadow-contrast-10);
    }
</style>

<script src="/static/js/editorjs/editor.js?v={{ app_version }}"></script>
<script src="/static/js/editorjs/header.js?v={{ app_version }}"></script>
<script src="/static/js/editorjs/list.js?v={{ app_version }}"></script>
<script>
    function markdownToEditorJs(md) {
        const blocks = [];
        const paragraphs = md.split('\n\n');
        paragraphs.forEach(p => {
            if (p.startsWith('### ')) {
                blocks.push({ type: 'header', data: { text: p.replace('### ', ''), level: 3 } });
            } else if (p.startsWith('## ')) {
                blocks.push({ type: 'header', data: { text: p.replace('## ', ''), level: 2 } });
            } else if (p.startsWith('# ')) {
                blocks.push({ type: 'header', data: { text: p.replace('# ', ''), level: 1 } });
            } else if (p.startsWith('- ')) {
                const items = p.split('\n').filter(item => item.startsWith('- ')).map(item => item.replace('- ', ''));
                if (items.length > 0) {
                    blocks.push({ type: 'list', data: { style: 'unordered', items: items } });
                }
            } else if (p.trim() !== '') {
                const htmlText = p.replace(/\n/g, '<br>');
                blocks.push({ type: 'paragraph', data: { text: htmlText } });
            }
        });
        return { blocks: blocks };
    }

    function editorJsToMarkdown(data) {
        let md = '';
        data.blocks.forEach(block => {
            if (block.type === 'header') {
                md += '#'.repeat(block.data.level) + ' ' + block.data.text + '\n\n';
            } else if (block.type === 'paragraph') {
                const plainText = block.data.text.replace(/<br>/gi, '\n');
                md += plainText + '\n\n';
            } else if (block.type === 'list') {
                block.data.items.forEach(item => {
                    md += '- ' + item + '\n';
                });
                md += '\n';
            }
        });
        return md.trim();
    }

    window.markdownToEditorJs = markdownToEditorJs;
    window.editorJsToMarkdown = editorJsToMarkdown;
</script>
{% endblock %}
