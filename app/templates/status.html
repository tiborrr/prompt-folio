<div class="status-alert {% if is_error %}error{% else %}success{% endif %} slide-in" style="margin-top: 15px; padding: 12px 15px; border-radius: 8px; font-size: 0.9rem; display: flex; align-items: center; gap: 10px; background: {% if is_error %}rgba(255, 0, 0, 0.1){% else %}rgba(33, 161, 121, 0.1){% endif %}; border: 1px solid {% if is_error %}var(--color-error){% else %}var(--color-success){% endif %}; color: {% if is_error %}var(--color-error){% else %}var(--color-success){% endif %};">
    {% if is_error %}
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>
    {% else %}
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>
    {% endif %}
    {{ message }}
</div>
