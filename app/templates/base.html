<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ owner_name }} | AI Assistant</title>
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css?v={{ app_version }}">
    <script src="/static/js/htmx/htmx.min.js?v={{ app_version }}"></script>
    <script src="/static/js/htmx/response-targets.js?v={{ app_version }}"></script>
    <script src="/static/js/htmx/sse.js?v={{ app_version }}"></script>

    {% if recaptcha_client_side_key %}
    <script src="https://www.google.com/recaptcha/api.js?render={{ recaptcha_client_side_key }}"></script>
    {% endif %}
    <style>
        :root {
            --shadow-grey: {{ colors.shadow_grey }};
            --sweet-salmon: {{ colors.sweet_salmon }};
            --khaki-beige: {{ colors.khaki_beige }};
            --muted-teal: {{ colors.muted_teal }};
            --seaweed: {{ colors.seaweed }};

            --shadow-grey-contrast: {{ contrast_colors.shadow_grey_contrast }};
            --sweet-salmon-contrast: {{ contrast_colors.sweet_salmon_contrast }};
            --khaki-beige-contrast: {{ contrast_colors.khaki_beige_contrast }};
            --muted-teal-contrast: {{ contrast_colors.muted_teal_contrast }};
            --seaweed-contrast: {{ contrast_colors.seaweed_contrast }};
        }
    </style>
    {% block head %}{% endblock %}
</head>
<body hx-ext="response-targets">
    <div class="background-blob blob-1"></div>
    <div class="background-blob blob-2"></div>
    
    <main class="container">
        {% block header %}
        <header class="app-header">
            <div class="avatar">
                <span>{{ (owner_name or 'U')[0]|upper }}</span>
            </div>
            <div class="header-text">
                <h1>{{ owner_name }}</h1>
                <p>AI Assistant & Digital Architect</p>
            </div>
        </header>
        {% endblock %}

        {% block content %}{% endblock %}
    </main>

    {% block scripts %}{% endblock %}

<script>
document.addEventListener('htmx:confirm', function(evt) {
    // If the request has already been custom confirmed, allow it to proceed immediately
    if (evt.target && evt.target.getAttribute('data-confirmed') === 'true') {
        evt.target.removeAttribute('data-confirmed');
        return;
    }

    if (evt.detail.question) {
        evt.preventDefault();
        
        var modal = document.getElementById('custom-confirm-modal');
        var questionText = document.getElementById('custom-confirm-question');
        var cancelBtn = document.getElementById('custom-confirm-cancel');
        var confirmBtn = document.getElementById('custom-confirm-ok');
        
        questionText.textContent = evt.detail.question;
        modal.style.display = 'flex';
        // Add a slight delay before adding the class to trigger the transition
        setTimeout(() => modal.classList.add('visible'), 10);
        
        var handleCancel = function() {
            modal.classList.remove('visible');
            setTimeout(() => modal.style.display = 'none', 200);
            cleanup();
        };
        
        var handleConfirm = function() {
            modal.classList.remove('visible');
            setTimeout(() => modal.style.display = 'none', 200);
            
            // Set the confirmation flag on the target element to bypass confirm on the second event trigger
            if (evt.target) {
                evt.target.setAttribute('data-confirmed', 'true');
            }
            evt.detail.issueRequest();
            cleanup();
        };
        
        var cleanup = function() {
            cancelBtn.removeEventListener('click', handleCancel);
            confirmBtn.removeEventListener('click', handleConfirm);
        };
        
        cancelBtn.addEventListener('click', handleCancel);
        confirmBtn.addEventListener('click', handleConfirm);
    }
});
</script>

<!-- Custom HTMX Confirm Modal -->
<div id="custom-confirm-modal" style="display: none; position: fixed; inset: 0; z-index: 9999; align-items: center; justify-content: center; background: rgba(0,0,0,0.4); backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px); opacity: 0; transition: opacity 0.2s ease;">
    <div style="background: rgba(30, 30, 30, 0.8); border: 1px solid var(--shadow-contrast-10); border-radius: 12px; padding: 25px; max-width: 400px; width: 90%; box-shadow: 0 10px 30px rgba(0,0,0,0.5); transform: translateY(10px); transition: transform 0.2s ease;" class="modal-content">
        <h3 style="margin-top: 0; margin-bottom: 15px; color: var(--shadow-grey-contrast); font-size: 1.2rem; display: flex; align-items: center; gap: 10px;">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="var(--sweet-salmon)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path><line x1="12" y1="9" x2="12" y2="13"></line><line x1="12" y1="17" x2="12.01" y2="17"></line></svg>
            Confirmation
        </h3>
        <p id="custom-confirm-question" style="color: var(--shadow-contrast-80); margin-bottom: 25px; line-height: 1.5;"></p>
        <div style="display: flex; justify-content: flex-end; gap: 10px;">
            <button id="custom-confirm-cancel" class="hover-bg-translucent" style="border: 1px solid var(--shadow-contrast-20); padding: 8px 16px; border-radius: 6px; cursor: pointer; font-weight: 600; color: var(--shadow-contrast-70);">Cancel</button>
            <button id="custom-confirm-ok" class="hover-bg-salmon" style="border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; font-weight: 600;">Yes, proceed</button>
        </div>
    </div>
</div>
<style>
    #custom-confirm-modal.visible { opacity: 1 !important; }
    #custom-confirm-modal.visible .modal-content { transform: translateY(0) !important; }
</style>

<script>
// Click-to-edit utility function
function initClickToEdit() {
    document.querySelectorAll('.editable-display').forEach(function(display) {
        display.addEventListener('click', function() {
            var displayId = this.id;
            var container = this.closest('[id$="-container"]') || this.parentElement;
            
            // Hide display and show edit
            this.classList.add('hidden');
            
            // Find the corresponding edit element
            var editId = displayId.replace('-display', '-edit');
            var editEl = container.querySelector('#' + editId);
            if (editEl) {
                editEl.classList.add('active');
                // Focus the input if it exists
                var input = editEl.querySelector('input');
                if (input) {
                    input.focus();
                }
            }
        });
    });
}

// Initialize on page load and after HTMX swaps
document.addEventListener('DOMContentLoaded', initClickToEdit);
document.body.addEventListener('htmx:afterSwap', initClickToEdit);
</script>

</body>
</html>
