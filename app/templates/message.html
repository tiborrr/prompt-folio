{% if is_user %}
<div class="message user slide-in">
    <div class="msg-bubble">
        {{ message | markdown | safe }}
    </div>
</div>
{% else %}
<div class="message assistant slide-in">
    <div class="msg-avatar" {% if has_avatar %}style="background-image: url('/avatar?v={{ app_version }}'); background-size: cover; background-position: center; color: transparent;"{% endif %}>{% if is_admin %}TC{% else %}AI{% endif %}</div>
    <div class="msg-bubble">
        {{ message | markdown | safe }}
    </div>
</div>
{% endif %}
