{% if is_taken_over %}
<div id="takeover-controls" hx-swap-oob="true" style="text-align:center; margin-top:15px; margin-bottom: 5px;">
    <div style="margin-bottom: 10px; font-size: 0.9rem; color: var(--sweet-salmon);">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align: text-bottom; margin-right: 4px;"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path></svg>
        {{ owner_name }} has been notified. The AI is paused.
    </div>
    <button hx-post="/revert_takeover" hx-swap="none" class="clear-btn hover-scale" style="background:var(--muted-teal); color:var(--muted-teal-contrast); border:none; padding:8px 15px; border-radius:5px; cursor:pointer; font-weight:600; font-size: 0.9rem;">
        Nevermind, switch back to AI
    </button>
</div>
{% else %}
<div id="takeover-controls" hx-swap-oob="true" style="text-align:center; margin-top:15px; margin-bottom: 5px;">
    <button hx-post="/takeover_request" hx-swap="none" class="clear-btn hover-scale" style="background:var(--sweet-salmon); color:var(--sweet-salmon-contrast); border:none; padding:8px 15px; border-radius:5px; cursor:pointer; font-weight:600; font-size: 0.9rem;">
        Talk to {{ owner_name }} directly
    </button>
</div>
{% endif %}

<div id="admin-takeover-controls" hx-swap-oob="true" style="margin-bottom: 10px;">
    <button class="primary-btn" hx-post="/manage/chat/{{ session_id }}/toggle_takeover" hx-swap="none" style="width: 100%; font-size: 0.9rem; padding: 10px; background: {{ 'var(--muted-teal)' if is_taken_over else 'var(--sweet-salmon)' }}; color: {{ 'var(--muted-teal-contrast)' if is_taken_over else 'var(--sweet-salmon-contrast)' }}; transition: background 0.3s, transform 0.2s;">
        {{ 'Return to AI (Unmute)' if is_taken_over else 'Take Over Chat (Mute AI)' }}
    </button>
</div>

<h2 id="chat-title" hx-swap-oob="outerHTML" style="font-size: 1.5rem; display: flex; align-items: center;">
    {% if is_taken_over %}
        <span class="pulse-dot"></span> Chatting with {{ owner_name }}
    {% else %}
        Conversation
    {% endif %}
</h2>

<input id="chat-input" hx-swap-oob="outerHTML" type="text" name="message" class="chat-input" placeholder="{% if is_taken_over %}Message {{ owner_name }}...{% else %}Ask me anything about {{ owner_name }}...{% endif %}" required autocomplete="off" autofocus aria-label="Message">
