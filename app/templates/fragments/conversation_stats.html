<div id="conversation-stats" hx-swap-oob="true" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; margin-bottom: 20px;">
    <div class="glass-panel" style="padding: 15px; background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255,255,255,0.05); border-radius: 8px; display: flex; flex-direction: column; gap: 5px; height: auto;">
        <span style="font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-secondary); opacity: 0.8;">Total Chats</span>
        <strong style="font-size: 1.8rem; color: var(--text-primary); font-family: 'Outfit', sans-serif;">{{ total_chats }}</strong>
    </div>
    <div class="glass-panel" style="padding: 15px; background: {% if takeover_requests > 0 %}rgba(251, 159, 137, 0.15){% else %}rgba(255, 255, 255, 0.03){% endif %}; border: 1px solid {% if takeover_requests > 0 %}var(--sweet-salmon){% else %}rgba(255,255,255,0.05){% endif %}; border-radius: 8px; display: flex; flex-direction: column; gap: 5px; transition: all 0.3s ease; height: auto;">
        <span style="font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.05em; color: {% if takeover_requests > 0 %}var(--sweet-salmon){% else %}var(--text-secondary){% endif %}; font-weight: {% if takeover_requests > 0 %}bold{% else %}normal{% endif %};">Takeovers {% if takeover_requests > 0 %}🚨{% endif %}</span>
        <strong style="font-size: 1.8rem; color: {% if takeover_requests > 0 %}var(--sweet-salmon){% else %}var(--text-primary){% endif %}; font-family: 'Outfit', sans-serif;">{{ takeover_requests }}</strong>
    </div>
</div>
