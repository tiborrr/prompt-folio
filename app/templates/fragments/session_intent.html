<div id="intent-container" style="display: flex; align-items: center; gap: 5px; margin-top: 3px;">
    Intent:
    <div id="intent-display" hx-get="/manage/chat/{{ id }}/edit_intent" hx-target="#intent-container" hx-swap="outerHTML" style="display: flex; align-items: center; gap: 6px; color: var(--shadow-contrast-60); cursor: pointer;">
        <span>{{ intent if intent else 'No specific intent' }}</span>
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="opacity: 0.5;"><path d="M12 20h9"></path><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"></path></svg>
    </div>
</div>
