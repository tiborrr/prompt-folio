<div id="intent-container" style="display: flex; align-items: center; gap: 5px; margin-top: 3px;">
    Intent: 
    <div id="intent-display" class="editable-display" style="display: flex; align-items: center; gap: 6px; color: var(--shadow-contrast-60);">
        <span>{{ intent if intent else 'No specific intent' }}</span>
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="opacity: 0.5;"><path d="M12 20h9"></path><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"></path></svg>
    </div>
    <div id="intent-edit" class="editable-edit" style="align-items: center; gap: 8px; flex: 1;">
        <input type="text" id="intent-input" name="intent" value="{{ intent if intent else '' }}" placeholder="No specific intent"
               hx-post="/manage/chat/{{ id }}/update_intent" 
               hx-trigger="blur, keyup[key=='Enter']" hx-target="#intent-container" hx-swap="outerHTML"
               style="background:transparent; border:none; border-bottom:1px dashed var(--shadow-contrast-30); color:var(--text-primary); font-size:1em; width: 100%; outline:none; padding:2px; font-family: inherit;">
    </div>
</div>
