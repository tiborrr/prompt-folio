<div style="margin-top: 25px; border-top: 1px dashed rgba(255,255,255,0.08); padding-top: 20px;">
    <h4 style="margin-bottom: 12px; font-size: 0.95rem; color: var(--shadow-grey-contrast); text-transform: uppercase; letter-spacing: 0.05em; font-family: 'Outfit', sans-serif;">Source Documents in Database</h4>
    <div style="display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px;">
        {% for doc in source_documents %}
        <div class="document-item glass-panel" style="display: flex; justify-content: space-between; align-items: center; padding: 12px 15px; background: rgba(255,255,255,0.02); border: 1px solid var(--border-color); border-radius: 6px;">
            <div style="display: flex; align-items: center; gap: 12px;">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--khaki-beige)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="opacity: 0.8;"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
                <div>
                    <a href="/manage/document/{{ doc.id }}" target="_blank" class="hover-color-salmon" style="text-decoration: none; font-weight: 500; font-size: 0.9rem;">{{ doc.filename }}</a>
                    <div style="font-size: 0.75rem; color: var(--text-secondary); margin-top: 2px;">Uploaded {{ doc.created_at.strftime('%Y-%m-%d %H:%M') }}</div>
                </div>
            </div>
            <button hx-delete="/manage/document/{{ doc.id }}" 
                    hx-confirm="Are you sure you want to delete this source document? This will remove it from future context generations."
                    hx-target="closest .document-item"
                    hx-swap="outerHTML"
                    class="primary-btn" 
                    style="width: auto; padding: 4px 8px; font-size: 0.75rem; background: rgba(251, 159, 137, 0.1); border: 1px solid var(--sweet-salmon); color: var(--sweet-salmon);">
                Delete
            </button>
        </div>
        {% endfor %}
    </div>
    
    <div style="display: flex; justify-content: flex-end; gap: 15px; margin-top: 15px; align-items: center;">
        <button hx-post="/manage/rebuild_context" 
                hx-swap="none"
                hx-indicator="#rebuild-indicator"
                class="primary-btn">
            Rebuild Profile from Source Documents
        </button>
    </div>
    <div id="rebuild-indicator" class="htmx-indicator" style="margin-top: 15px; text-align: right;">
        <div class="typing-indicator">
            <span></span><span></span><span></span>
        </div>
        <span style="font-size: 0.85rem; color: var(--text-secondary); margin-left: 10px;">Extracting and merging context from all documents... This might take a minute.</span>
    </div>
</div>
