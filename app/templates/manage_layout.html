{% extends "base.html" %}

{% block content %}
<div class="glass-panel slide-up" style="height: 85vh; display: flex; flex-direction: column; overflow: hidden; padding: 0;">
    <div id="manage-body" style="display: contents;">
        <!-- Fixed Header Area -->
        <div class="manage-header-area" style="padding: 30px 30px 0 30px; flex-shrink: 0;">
        <div class="chat-header manage-header" style="display: flex; justify-content: space-between; align-items: center; border-bottom: none; padding-bottom: 0;">
            <h2 style="font-size: 1.5rem;">Settings</h2>
            <div class="manage-actions" style="display: flex; gap: 10px; align-items: center;">
                <form action="/manage/logout" method="POST" style="margin: 0;" title="Sign Out">
                    <button type="submit" class="icon-btn logout-btn" aria-label="Sign Out">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
                    </button>
                </form>
                <a href="/" class="icon-btn close-btn" title="Close" aria-label="Close Settings">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                </a>
            </div>
        </div>

        <!-- Tabbed Navigation (Pills) -->
        <div class="manage-tabs pill-container" hx-boost="true" hx-target="#manage-body" hx-select="#manage-body" hx-swap="outerHTML">
            <a href="/manage" class="tab-pill {% if active_tab == 'conversations' %}active{% endif %}">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"></path></svg>
                <span class="tab-text">Chats</span>
            </a>
            <a href="/manage/context" class="tab-pill {% if active_tab == 'context' %}active{% endif %}">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
                <span class="tab-text">Context</span>
            </a>
            <a href="/manage/appearance" class="tab-pill {% if active_tab == 'appearance' %}active{% endif %}">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="4" y1="21" x2="4" y2="14"></line><line x1="4" y1="10" x2="4" y2="3"></line><line x1="12" y1="21" x2="12" y2="12"></line><line x1="12" y1="8" x2="12" y2="3"></line><line x1="20" y1="21" x2="20" y2="16"></line><line x1="20" y1="12" x2="20" y2="3"></line><line x1="1" y1="14" x2="7" y2="14"></line><line x1="9" y1="8" x2="15" y2="8"></line><line x1="17" y1="16" x2="23" y2="16"></line></svg>
                <span class="tab-text">Settings</span>
            </a>
        </div>
    </div>

    <!-- Scrollable Content Area -->
    <div class="scroller manage-content-area" style="flex: 1; overflow-y: auto; padding: 25px 30px; position: relative;">
        <div class="sentinel-top"></div>
        <div class="indicator-top" style="top: -25px; margin-bottom: -30px;"></div>
        
        {% block manage_content %}{% endblock %}
        
        <div class="indicator-bottom" style="bottom: -25px; margin-top: -30px;"></div>
        <div class="sentinel-bottom"></div>
    </div>
    </div>
</div>

<script>
function initScrollers() {
    if (!CSS.supports('container-type', 'scroll-state')) {
        const scrollers = document.querySelectorAll('.scroller');
        
        scrollers.forEach(scroller => {
            // Check if already initialized
            if (scroller.dataset.observerInitialized) return;
            scroller.dataset.observerInitialized = 'true';
            
            const topSentinel = scroller.querySelector('.sentinel-top');
            const bottomSentinel = scroller.querySelector('.sentinel-bottom');
            
            if (!topSentinel || !bottomSentinel) return;

            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.target === topSentinel) {
                        scroller.classList.toggle('scrolled-down', !entry.isIntersecting);
                    }
                    if (entry.target === bottomSentinel) {
                        scroller.classList.toggle('can-scroll-down', !entry.isIntersecting);
                    }
                });
            }, { root: scroller, rootMargin: '0px' });

            observer.observe(topSentinel);
            observer.observe(bottomSentinel);
        });
    }
}

document.addEventListener("DOMContentLoaded", initScrollers);
document.body.addEventListener('htmx:afterSwap', initScrollers);


{% endblock %}
